name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - uses: actions/setup-python@v7
        with:
          python-version: "3.13"
          cache: pip
      - name: Install development dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Verify versions
        run: python scripts/verify_version.py
      - name: Ruff lint
        run: python -m ruff check app tests scripts
      - name: Ruff format
        run: python -m ruff format --check app tests scripts
      - name: Mypy
        run: python -m mypy
      - name: Tests with coverage
        run: python -m pytest --cov=app --cov-report=term-missing --cov-report=xml
      - name: Package metadata
        run: python -m pip check
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  tests:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install test dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e . pytest "httpx>=0.27,<1" "httpx2>=2,<3"
      - name: Run tests
        run: python -m pytest

  windows-smoke:
    name: Windows package and smoke test
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v7
        with:
          python-version: "3.13"
          cache: pip
      - name: Install
        run: >-
          python -m pip install --upgrade pip &&
          python -m pip install -e . pytest "httpx>=0.27,<1" "httpx2>=2,<3"
          -r packaging/windows/requirements-build.txt
      - name: API, PDF, KoSIT, settings and CLI integration tests
        run: >-
          python -m pytest tests/test_api.py tests/test_pdf.py tests/test_kosit.py
          tests/test_settings.py tests/test_cli.py tests/test_desktop_security.py tests/test_windows_launcher.py
          tests/test_windows_components.py
      - uses: actions/cache@v5
        with:
          path: .cache/windows-components
          key: windows-components-${{ hashFiles('packaging/windows/components.lock.json') }}
      - name: Prepare locked Java and KoSIT components
        run: python scripts/prepare_windows_components.py
      - name: Build Windows x64 installer
        shell: pwsh
        run: .\scripts\build_windows.ps1
      - name: Test installed Windows package
        shell: pwsh
        run: .\scripts\test_windows_package.ps1 -ConfirmIsolatedEnvironment
      - uses: actions/upload-artifact@v7
        with:
          name: windows-x64-package-${{ github.sha }}
          path: |
            dist/*-Windows-x64-Setup.exe
            dist/*-Windows-x64-SHA256.txt

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build image
        run: docker build --tag e-rechnung-pruefer:test .
