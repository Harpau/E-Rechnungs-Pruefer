name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "22"
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
          cache: pip
      - name: Install development dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Verify versions
        run: python scripts/verify_version.py
      - name: Ruff lint
        run: python -m ruff check app tests scripts
      - name: Ruff format
        run: python -m ruff format --check app tests scripts
      - name: Mypy
        run: python -m mypy
      - name: Tests with coverage
        run: python -m pytest --cov=app --cov-report=term-missing --cov-report=xml
      - name: Package metadata
        run: python -m pip check
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  tests:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install test dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e . pytest "httpx>=0.27,<1" "httpx2>=2,<3"
      - name: Run tests
        run: python -m pytest

  windows-smoke:
    name: Windows package and smoke test
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13.14"
          cache: pip
          cache-dependency-path: packaging/windows/requirements-release.txt
      - name: Install
        run: >-
          python -m pip install --require-hashes --only-binary=:all:
          -r packaging/windows/requirements-release.txt &&
          python -m pip install --no-deps --no-build-isolation -e . &&
          python -m pip check
      - name: API, PDF, KoSIT, settings and CLI integration tests
        run: >-
          python -m pytest tests/test_api.py tests/test_pdf.py tests/test_kosit.py
          tests/test_settings.py tests/test_cli.py tests/test_desktop_security.py tests/test_windows_launcher.py
          tests/test_windows_components.py tests/test_api_service_mode.py tests/test_windows_service_browser.py
          tests/test_windows_service_config.py tests/test_windows_service_runtime.py
          tests/test_windows_service_metadata.py
          tests/test_windows_service_packaging.py tests/test_windows_acl.py
          tests/test_windows_desktop_migration.py tests/test_windows_install_transaction.py
          tests/test_windows_install_recovery.py tests/test_windows_install_reconcile.py
          tests/test_windows_open_client_transaction.py tests/test_windows_native_adapters.py
      - uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: .cache/windows-components
          key: windows-components-${{ hashFiles('packaging/windows/components.lock.json') }}
      - name: Prepare locked Java and KoSIT components
        run: python scripts/prepare_windows_components.py
      - name: Build Windows x64 installer
        shell: pwsh
        run: .\scripts\build_windows.ps1 -BuildElevatedMigrationTestInstaller
      - name: Test installed Windows package
        shell: pwsh
        run: .\scripts\test_windows_package.ps1 -ConfirmIsolatedEnvironment
      - name: Test installed Windows service package
        shell: pwsh
        run: .\scripts\test_windows_service_package.ps1 -ConfirmIsolatedEnvironment -AllowElevatedMigrationTestContext -CommitHardKillRecovery Immediate
      - name: Test migration from released v1.3.0 desktop mode
        shell: pwsh
        run: .\scripts\test_windows_migration.ps1 -ConfirmIsolatedEnvironment -AllowElevatedMigrationTestContext -DesktopHardKillRecovery Immediate
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: windows-x64-package-${{ github.sha }}
          path: |
            dist/*-Windows-x64-Setup.exe
            dist/*-Windows-x64-Dienst-Setup.exe
            dist/*-Windows-x64-Binaries.zip
            dist/*-Windows-x64-SHA256SUMS.txt

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          persist-credentials: false
      - name: Build image
        run: docker build --tag e-rechnung-pruefer:test .
