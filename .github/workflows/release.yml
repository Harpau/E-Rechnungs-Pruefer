name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  source-release:
    name: Source release artefacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - name: Install development dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Verify tag and quality gate
        shell: bash
        run: |
          VERSION="$(python scripts/verify_version.py --print)"
          test "v${VERSION}" = "${GITHUB_REF_NAME}"
          ./scripts/check.sh
      - name: Build release artefacts
        run: python scripts/build_release.py
      - uses: actions/upload-artifact@v7
        with:
          name: source-release-${{ github.ref_name }}
          path: dist/*

  windows-release:
    name: Windows x64 installer
    runs-on: windows-2022
    outputs:
      signed: ${{ steps.signature.outputs.signed }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          architecture: x64
          cache: pip
      - name: Install application and Windows build dependencies
        run: >-
          python -m pip install --upgrade pip &&
          python -m pip install -e . pytest "httpx>=0.27,<1" "httpx2>=2,<3"
          -r packaging/windows/requirements-build.txt
      - name: Verify tag and Windows integration tests
        shell: pwsh
        run: |
          $version = python scripts/verify_version.py --print
          if ("v$version" -ne $env:GITHUB_REF_NAME) {
            throw "Tag $env:GITHUB_REF_NAME passt nicht zu Version $version."
          }
          python -m pytest tests/test_api.py tests/test_pdf.py tests/test_kosit.py tests/test_settings.py tests/test_cli.py tests/test_desktop_security.py tests/test_windows_launcher.py tests/test_windows_components.py
      - uses: actions/cache@v5
        with:
          path: .cache/windows-components
          key: windows-components-${{ hashFiles('packaging/windows/components.lock.json') }}
      - name: Prepare locked Java and KoSIT components
        run: python scripts/prepare_windows_components.py
      - name: Import optional Authenticode certificate
        shell: pwsh
        env:
          CERTIFICATE_BASE64: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          if (-not $env:CERTIFICATE_BASE64) {
            Write-Warning "Kein Signierzertifikat konfiguriert; das Testartefakt wird nicht im GitHub Release veröffentlicht."
            exit 0
          }
          $bytes = [Convert]::FromBase64String($env:CERTIFICATE_BASE64)
          $flags = [System.Security.Cryptography.X509Certificates.X509KeyStorageFlags]::PersistKeySet -bor
            [System.Security.Cryptography.X509Certificates.X509KeyStorageFlags]::Exportable
          $certificate = [System.Security.Cryptography.X509Certificates.X509Certificate2]::new(
            $bytes,
            $env:CERTIFICATE_PASSWORD,
            $flags
          )
          $store = [System.Security.Cryptography.X509Certificates.X509Store]::new("My", "CurrentUser")
          $store.Open([System.Security.Cryptography.X509Certificates.OpenFlags]::ReadWrite)
          $store.Add($certificate)
          $store.Close()
          "EINVOICE_SIGN_CERT_SHA1=$($certificate.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Build Windows x64 installer
        shell: pwsh
        run: .\scripts\build_windows.ps1
      - name: Test installed Windows package
        shell: pwsh
        run: |
          if ($env:EINVOICE_SIGN_CERT_SHA1) {
            .\scripts\test_windows_package.ps1 -RequireSignature
          } else {
            .\scripts\test_windows_package.ps1
          }
      - name: Inspect installer signature
        id: signature
        shell: pwsh
        run: |
          $setup = Get-ChildItem dist\*-Windows-x64-Setup.exe | Select-Object -First 1
          $signature = Get-AuthenticodeSignature $setup.FullName
          $signed = if ($signature.Status -eq "Valid") { "true" } else { "false" }
          "signed=$signed" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Authenticode-Status: $($signature.Status)"
      - uses: actions/upload-artifact@v7
        with:
          name: windows-release-${{ github.ref_name }}
          path: |
            dist/*-Windows-x64-Setup.exe
            dist/*-Windows-x64-SHA256.txt

  publish:
    name: Publish GitHub release
    needs: [source-release, windows-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: source-release-${{ github.ref_name }}
          path: release-dist
      - uses: actions/download-artifact@v8
        if: needs.windows-release.outputs.signed == 'true'
        with:
          name: windows-release-${{ github.ref_name }}
          path: release-dist
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}" release-dist/*
          --title "E-Rechnungs-Pruefer ${GITHUB_REF_NAME#v}" --generate-notes
