name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - name: Install development dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Verify tag and quality gate
        shell: bash
        run: |
          VERSION="$(python scripts/verify_version.py --print)"
          test "v${VERSION}" = "${GITHUB_REF_NAME}"
          ./scripts/check.sh
      - name: Build release artefacts
        run: python scripts/build_release.py
      - uses: actions/upload-artifact@v7
        with:
          name: e-rechnung-pruefer-${{ github.ref_name }}
          path: dist/*
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/* --title "E-Rechnungs-Pruefer ${GITHUB_REF_NAME#v}" --generate-notes
