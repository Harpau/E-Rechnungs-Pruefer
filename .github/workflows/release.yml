name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  source-release:
    name: Source release artefacts
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Verify release ref before running repository code
        shell: bash
        run: |
          VERSION="$(tr -d '\r\n' < VERSION)"
          test -n "${VERSION}"
          test "v${VERSION}" = "${GITHUB_REF_NAME}"
          test "$(git cat-file -t "${GITHUB_REF_NAME}")" = "tag"
          git merge-base --is-ancestor "${GITHUB_SHA}" origin/main
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
          cache: pip
      - name: Install development dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Verify tag and quality gate
        shell: bash
        run: |
          python scripts/verify_version.py
          ./scripts/check.sh
      - name: Build release artefacts
        run: python scripts/build_release.py
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: source-release-${{ github.run_id }}
          path: dist/*

  windows-release:
    name: Windows x64 installer
    runs-on: windows-2022
    environment: release
    permissions:
      contents: read
      id-token: write
    env:
      EINVOICE_AZURE_KEY_VAULT_URL: ${{ vars.AZURE_KEY_VAULT_URL }}
      EINVOICE_AZURE_KEY_VAULT_CERTIFICATE: ${{ vars.AZURE_CODE_SIGNING_CERTIFICATE }}
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Verify release ref before running repository code
        shell: pwsh
        run: |
          $version = (Get-Content -LiteralPath "VERSION" -Raw).Trim()
          if (-not $version) {
            throw "VERSION darf nicht leer sein."
          }
          if ($env:GITHUB_EVENT_NAME -eq "push") {
            if ("v$version" -ne $env:GITHUB_REF_NAME) {
              throw "Tag $env:GITHUB_REF_NAME passt nicht zu Version $version."
            }
            $tagType = (git cat-file -t $env:GITHUB_REF_NAME).Trim()
            if ($tagType -ne "tag") {
              throw "Der Release-Tag muss annotiert sein."
            }
            git merge-base --is-ancestor $env:GITHUB_SHA origin/main
            if ($LASTEXITCODE -ne 0) {
              throw "Der Release-Tag zeigt nicht auf einen Commit aus main."
            }
          } elseif ($env:GITHUB_EVENT_NAME -eq "workflow_dispatch") {
            if ($env:GITHUB_REF -ne "refs/heads/main") {
              throw "Manuelle Signiertests dürfen nur auf main gestartet werden."
            }
          } else {
            throw "Nicht unterstützter Release-Auslöser: $env:GITHUB_EVENT_NAME"
          }
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13.14"
          architecture: x64
          cache: pip
          cache-dependency-path: packaging/windows/requirements-release.txt
      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: "8.0.x"
      - name: Install application and Windows build dependencies
        run: >-
          python -m pip install --require-hashes --only-binary=:all:
          -r packaging/windows/requirements-release.txt &&
          python -m pip install --no-deps --no-build-isolation -e . &&
          python -m pip check
      - name: Verify versions and run Windows integration tests
        shell: pwsh
        run: |
          python scripts/verify_version.py
          python -m pytest tests/test_api.py tests/test_pdf.py tests/test_kosit.py tests/test_settings.py tests/test_cli.py tests/test_desktop_security.py tests/test_windows_launcher.py tests/test_windows_components.py tests/test_api_service_mode.py tests/test_windows_service_browser.py tests/test_windows_service_config.py tests/test_windows_service_runtime.py tests/test_windows_service_metadata.py tests/test_windows_service_packaging.py tests/test_windows_acl.py tests/test_windows_desktop_migration.py tests/test_windows_install_transaction.py tests/test_windows_install_recovery.py tests/test_windows_install_reconcile.py tests/test_windows_open_client_transaction.py tests/test_windows_native_adapters.py
      - uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: .cache/windows-components
          key: windows-components-${{ hashFiles('packaging/windows/components.lock.json') }}
      - name: Prepare locked Java and KoSIT components
        run: python scripts/prepare_windows_components.py
      - name: Authenticate to Azure with OIDC
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Install pinned AzureSignTool
        shell: pwsh
        run: |
          $toolDirectory = Join-Path $env:RUNNER_TEMP "azure-sign-tool"
          dotnet tool install AzureSignTool --tool-path $toolDirectory --version 7.0.1
          if ($LASTEXITCODE -ne 0) {
            throw "AzureSignTool konnte nicht installiert werden."
          }
          $tool = Join-Path $toolDirectory "AzureSignTool.exe"
          "EINVOICE_AZURE_SIGN_TOOL=$tool" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Build Windows x64 installer
        shell: pwsh
        run: .\scripts\build_windows.ps1 -BuildElevatedMigrationTestInstaller
      - name: Test installed Windows package
        shell: pwsh
        run: .\scripts\test_windows_package.ps1 -RequireSignature -ConfirmIsolatedEnvironment
      - name: Test installed Windows service package
        shell: pwsh
        run: .\scripts\test_windows_service_package.ps1 -RequireSignature -ConfirmIsolatedEnvironment -AllowElevatedMigrationTestContext -CommitHardKillRecovery Immediate
      - name: Test signed migration from released v1.3.0 desktop mode
        shell: pwsh
        run: .\scripts\test_windows_migration.ps1 -RequireSignature -ConfirmIsolatedEnvironment -AllowElevatedMigrationTestContext -DesktopHardKillRecovery Immediate
      - name: Inspect all owned executable signatures
        shell: pwsh
        run: |
          $version = python scripts/verify_version.py --print
          $ownedFiles = @(
            "build\windows\bundle\E-Rechnungs-Pruefer\E-Rechnungs-Pruefer.exe",
            "build\windows\bundle\E-Rechnungs-Pruefer-Dienst\E-Rechnungs-Pruefer-Dienst.exe",
            "build\windows\bundle\E-Rechnungs-Pruefer-Oeffnen.exe",
            "dist\E-Rechnungs-Pruefer-$version-Windows-x64-Setup.exe",
            "dist\E-Rechnungs-Pruefer-$version-Windows-x64-Dienst-Setup.exe"
          )
          foreach ($path in $ownedFiles) {
            $signature = Get-AuthenticodeSignature $path
            Write-Host "$path`: $($signature.Status) / $($signature.SignerCertificate.Subject)"
            if ($signature.Status -ne "Valid" -or $null -eq $signature.TimeStamperCertificate) {
              throw "Eigene EXE besitzt keine gültige Authenticode-Signatur mit Zeitstempel: $path"
            }
          }
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: windows-release-${{ github.run_id }}
          retention-days: 3
          path: |
            dist/*-Windows-x64-Setup.exe
            dist/*-Windows-x64-Dienst-Setup.exe
            dist/*-Windows-x64-Binaries.zip
            dist/*-Windows-x64-SHA256SUMS.txt

  publish:
    name: Publish GitHub release
    needs: [source-release, windows-release]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: source-release-${{ github.run_id }}
          path: release-dist
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: windows-release-${{ github.run_id }}
          path: release-dist
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --draft \
            --verify-tag \
            --title "E-Rechnungs-Pruefer ${GITHUB_REF_NAME#v}" \
            --generate-notes
          gh release upload "${GITHUB_REF_NAME}" release-dist/*
          gh release edit "${GITHUB_REF_NAME}" --draft=false
