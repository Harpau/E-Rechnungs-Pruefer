name: Steuerkategorie oder Steuerdarstellung
about: Widerspruch zwischen XML-Code, Begründung und Anzeige untersuchen
labels: [tax, validation]
body:
  - type: input
    id: syntax
    attributes:
      label: Syntax und Profil
      placeholder: CII, urn:cen.eu:en16931:2017
    validations:
      required: true
  - type: input
    id: category
    attributes:
      label: Steuerkategorie und Rate
      placeholder: G, 0
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Begründungstext oder -code im XML
    validations:
      required: true
  - type: textarea
    id: current
    attributes:
      label: Aktuelle Darstellung oder Befund
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Erwartete technische Darstellung
    validations:
      required: true
  - type: textarea
    id: minimal-xml
    attributes:
      label: Minimale anonymisierte XML
      render: xml
  - type: checkboxes
    id: confirmation
    attributes:
      label: Bestätigung
      options:
        - label: Es werden keine echten Rechnungs-, Personen-, Steuer- oder Kontodaten veröffentlicht.
          required: true
        - label: Die Anfrage unterscheidet technische Validierung und steuerrechtliche Einzelfallprüfung.
          required: true
